<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ═══ PWA ═══ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StreamVault" />

    <!-- ═══ Icons ═══ -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ═══ SEO ═══ -->
    <title>StreamVault — Streaming Premium</title>
    <meta name="description" content="Accede a Netflix, Disney+, Max, Paramount+ y más por el mejor precio. Activación instantánea." />
    <meta name="keywords" content="streaming, netflix, disney plus, max, cuentas streaming, peru" />
    <meta name="author" content="StreamVault" />

    <!-- ═══ Open Graph (WhatsApp / redes) ═══ -->
    <meta property="og:title" content="StreamVault — Streaming Premium" />
    <meta property="og:description" content="Accede a todas tus plataformas favoritas por el mejor precio. Activación instantánea." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://streamvault-virid.vercel.app" />
    <meta property="og:image" content="https://streamvault-virid.vercel.app/icon-512.png" />

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StreamVault" />
    <meta name="twitter:description" content="Streaming premium al mejor precio" />

    <!-- ═══ Safe area para iPhone X+ ═══ -->
    <style>
      body {
        margin: 0;
        padding: 0;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        background: #050510;
      }
      #root { min-height: 100dvh; }

      /* Splash screen mientras carga */
      #splash {
        position: fixed;
        inset: 0;
        background: #050510;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-text {
        color: #fff;
        font-size: 24px;
        font-weight: 800;
        font-family: system-ui, sans-serif;
        letter-spacing: -0.5px;
      }
      #splash-sub {
        color: #6b7280;
        font-size: 13px;
        font-family: system-ui, sans-serif;
        margin-top: 6px;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 #6366f144; }
        50% { transform: scale(1.06); box-shadow: 0 0 0 16px #6366f100; }
      }
    </style>
  </head>
  <body>

    <!-- Splash screen -->
    <div id="splash">
      <div id="splash-logo">⚡</div>
      <div id="splash-text">StreamVault</div>
      <div id="splash-sub">Cargando tu acceso...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- ═══ Registrar Service Worker ═══ -->
    <script>
      // Ocultar splash cuando React monte
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });

      // Registrar SW para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>

  </body>
</html>
